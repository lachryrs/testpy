name: schema-revision-migrate

on:
  issue_comment:
    types: [created]

jobs:
  test:
    if: toJson(github.event.issue.pull_request) != 'null' && github.event.comment.body == 'BUILD'

    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Bring DB to main branch schema state
        env:
          DATABASE_URL: postgresql://myuser:mypassword@localhost:5432/mydb
        run: |
          uv run --package migrations \
            alembic -c migrations/alembic.ini downgrade base

          MARKER="pr_${{ github.event.pull_request.number }}"
          EXISTING=$(grep -rl "revision_marker: $MARKER" migrations/alembic/versions/ 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Removing stale PR migration before reset: $EXISTING"
            rm "$EXISTING"
          fi

          git checkout origin/main -- migrations/alembic/versions/
          uv run --package migrations \
            alembic -c migrations/alembic.ini upgrade head

          git checkout ${{ github.head_ref }} -- migrations/alembic/versions/

      - name: Check if models changed
        id: models_changed
        run: |
          CHANGED=$(git diff origin/main --name-only | grep "api/app/models.py" || true)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Remove previously autogenerated migration for this PR
        if: steps.models_changed.outputs.changed != ''
        run: |
          MARKER="pr_${{ github.event.pull_request.number }}"
          EXISTING=$(grep -rl "revision_marker: $MARKER" migrations/alembic/versions/ 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Removing stale migration: $EXISTING"
            rm "$EXISTING"
          fi

      - name: Autogenerate migration
        if: steps.models_changed.outputs.changed != ''
        env:
          DATABASE_URL: postgresql://myuser:mypassword@localhost:5432/mydb
        run: |
          MARKER="pr_${{ github.event.pull_request.number }}"
          uv run --package migrations \
            alembic -c migrations/alembic.ini revision --autogenerate -m "auto_${MARKER}"

          FILE=$(ls -t migrations/alembic/versions/*.py | head -1)
          sed -i "1s/^/# revision_marker: $MARKER\n/" $FILE

      - name: Remove stale migration if models reverted
        if: steps.models_changed.outputs.changed == ''
        run: |
          MARKER="pr_${{ github.event.pull_request.number }}"
          EXISTING=$(grep -rl "revision_marker: $MARKER" migrations/alembic/versions/ 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Models reverted, removing migration: $EXISTING"
            rm "$EXISTING"
          fi

      - name: Test upgrade
        env:
          DATABASE_URL: postgresql://myuser:mypassword@localhost:5432/mydb
        run: |
          uv run --package migrations \
            alembic -c migrations/alembic.ini upgrade head

      - name: Test downgrade
        env:
          DATABASE_URL: postgresql://myuser:mypassword@localhost:5432/mydb
        run: |
          uv run --package migrations \
            alembic -c migrations/alembic.ini downgrade -1
          uv run --package migrations \
            alembic -c migrations/alembic.ini upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://myuser:mypassword@localhost:5432/mydb
        run: uv run pytest api/tests/

      - name: Commit migration changes back to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add migrations/alembic/versions/
          git diff --staged --quiet || git commit -m "ci: update migration for pr_${{ github.event.pull_request.number }}"
          git push origin ${{ github.head_ref }}